<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>markmedown</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1 class="logo">
        <span class="logo-icon">◈</span>
        markmedown
      </h1>
      <button id="new-file-btn" class="icon-btn" title="New file">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 3v10M3 8h10"/>
        </svg>
      </button>
    </div>

    <div class="search-container">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="7" cy="7" r="4.5"/>
        <path d="M10.5 10.5L14 14"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search files and content..." autocomplete="off" spellcheck="false">
    </div>

    <!-- Search results (shown when searching) -->
    <div id="search-results" class="search-results" hidden>
      <div class="search-results-header">
        <span id="search-results-count"></span>
        <button id="search-clear" class="icon-btn" title="Clear search">✕</button>
      </div>
      <div id="search-results-list" class="search-results-list"></div>
    </div>

    <div class="sidebar-stats" id="sidebar-stats">
      <span id="file-count">0 files</span>
      <span id="scan-status" class="status-dot status-scanning" title="Scanning..."></span>
    </div>

    <div class="tree-controls" id="tree-controls">
      <button id="collapse-all" class="tree-control-btn" title="Collapse all folders">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M7.976 10.072l4.357-4.357.62.618L7.975 11.3 3 6.333l.619-.618z"/>
        </svg>
      </button>
      <button id="expand-all" class="tree-control-btn" title="Expand all folders">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M7.976 5.928L3.62 10.285 3 9.667 7.976 4.7l4.976 4.967-.62.618z"/>
        </svg>
      </button>
    </div>

    <nav id="file-tree" class="file-tree">
      <!-- Tree rendered by app.js -->
    </nav>
  </aside>

  <!-- Main content -->
  <main id="main">
    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">◈</div>
      <h2>markmedown</h2>
      <p>Select a file from the sidebar to start reading or editing.</p>
    </div>

    <!-- File header (shown when file is open) -->
    <div id="file-header" class="file-header" hidden>
      <div class="file-header-left">
        <span id="file-path" class="file-path"></span>
        <span id="git-badge" class="git-badge" hidden>
          <span id="git-repo-name"></span>
        </span>
      </div>
      <div class="file-header-right">
        <span id="save-indicator" class="save-indicator" hidden>
          <span class="save-dot"></span> unsaved
        </span>
        <span id="file-size" class="file-meta"></span>
      </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar" class="toolbar" hidden>
      <div class="toolbar-group">
        <button class="toolbar-btn" data-command="toggleBold" title="Bold (Ctrl+B)"><strong>B</strong></button>
        <button class="toolbar-btn" data-command="toggleItalic" title="Italic (Ctrl+I)"><em>I</em></button>
        <button class="toolbar-btn" data-command="toggleStrikethrough" title="Strikethrough"><s>S</s></button>
        <button class="toolbar-btn" data-command="toggleInlineCode" title="Inline code">&lt;/&gt;</button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" data-command="heading1" title="Heading 1">H1</button>
        <button class="toolbar-btn" data-command="heading2" title="Heading 2">H2</button>
        <button class="toolbar-btn" data-command="heading3" title="Heading 3">H3</button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" data-command="bulletList" title="Bullet list">List</button>
        <button class="toolbar-btn" data-command="orderedList" title="Numbered list">1.</button>
        <button class="toolbar-btn" data-command="taskList" title="Checkbox list">[ ]</button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" data-command="blockquote" title="Blockquote">&gt;</button>
        <button class="toolbar-btn" data-command="codeBlock" title="Code block">{ }</button>
        <button class="toolbar-btn" data-command="hr" title="Horizontal rule">---</button>
        <button class="toolbar-btn" data-command="insertTable" title="Table">Table</button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" data-command="insertLink" title="Link">Link</button>
        <button class="toolbar-btn" data-command="insertImage" title="Image">Img</button>
      </div>

      <div class="toolbar-spacer"></div>

      <div class="toolbar-group">
        <button id="raw-toggle" class="toolbar-btn toolbar-btn-toggle" title="Toggle raw markdown">
          <!-- Show code icon: switches between WYSIWYG and raw -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
        </button>
        <button id="vscode-btn" class="toolbar-btn toolbar-btn-vscode" title="Open in VS Code" hidden>
          <!-- VS Code icon (official) -->
          <svg width="16" height="16" viewBox="0 0 100 100" fill="none">
            <mask id="a" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M70.912 99.317a6.223 6.223 0 004.96-.19l20.589-9.907A6.25 6.25 0 0099.98 83.6V16.4a6.25 6.25 0 00-3.519-5.624L75.872.869a6.222 6.222 0 00-7.114 1.273L29.355 38.12 12.187 25.26a4.162 4.162 0 00-5.318.262L1.38 30.637a4.168 4.168 0 00-.005 6.227L16.586 50 1.376 63.136a4.168 4.168 0 00.005 6.227l5.49 5.115a4.162 4.162 0 005.317.261l17.168-12.86 39.403 35.979a6.213 6.213 0 002.153 1.46zM75.024 27.2L45.088 50l29.936 22.8V27.2z" fill="#fff"/>
            </mask>
            <g mask="url(#a)">
              <path d="M96.461.87L75.872.87a6.222 6.222 0 00-7.114 1.273L29.355 38.12 12.187 25.26a4.162 4.162 0 00-5.318.262L1.38 30.637a4.168 4.168 0 00-.005 6.227L16.586 50 1.376 63.136a4.168 4.168 0 00.005 6.227l5.49 5.115a4.162 4.162 0 005.317.261l17.168-12.86 39.403 35.979a6.222 6.222 0 007.114 1.273l20.589-9.907A6.25 6.25 0 0099.98 83.6V16.4a6.25 6.25 0 00-3.519-5.624z" fill="#0065A9"/>
              <path d="M96.461.87L75.872.87a6.222 6.222 0 00-7.114 1.273L29.355 38.12 12.187 25.26a4.162 4.162 0 00-5.318.262L1.38 30.637a4.168 4.168 0 00-.005 6.227L16.586 50 1.376 63.136a4.168 4.168 0 00.005 6.227l5.49 5.115a4.162 4.162 0 005.317.261l17.168-12.86 39.403 35.979a6.222 6.222 0 007.114 1.273l20.589-9.907A6.25 6.25 0 0099.98 83.6V16.4a6.25 6.25 0 00-3.519-5.624z" fill="url(#paint0)"/>
              <path d="M75.872.869a6.222 6.222 0 00-7.114 1.273L29.355 38.12 12.187 25.26a4.162 4.162 0 00-5.318.262L1.38 30.637a4.168 4.168 0 00-.005 6.227L16.586 50 1.376 63.136a4.168 4.168 0 00.005 6.227l5.49 5.115a4.162 4.162 0 005.317.261l17.168-12.86 39.403 35.979a6.213 6.213 0 002.153 1.46V.869a6.213 6.213 0 00-2.153 0z" fill="url(#paint1)"/>
              <path fill-rule="evenodd" clip-rule="evenodd" d="M70.912 99.317a6.223 6.223 0 004.96-.19l20.589-9.907A6.25 6.25 0 0099.98 83.6V16.4a6.25 6.25 0 00-3.519-5.624L75.872.869a6.222 6.222 0 00-7.114 1.273L29.355 38.12 12.187 25.26a4.162 4.162 0 00-5.318.262L1.38 30.637a4.168 4.168 0 00-.005 6.227L16.586 50 1.376 63.136a4.168 4.168 0 00.005 6.227l5.49 5.115a4.162 4.162 0 005.317.261l17.168-12.86 39.403 35.979a6.213 6.213 0 002.153 1.46zM75.024 27.2L45.088 50l29.936 22.8V27.2z" fill="url(#paint2)"/>
            </g>
            <defs>
              <linearGradient id="paint0" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse"><stop stop-color="#fff" stop-opacity=".25"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
              <linearGradient id="paint1" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse"><stop stop-color="#fff" stop-opacity=".25"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
              <linearGradient id="paint2" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse"><stop stop-color="#fff" stop-opacity=".25"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
            </defs>
          </svg>
        </button>
      </div>
    </div>

    <!-- Editor area -->
    <div id="editor-container" class="editor-container" hidden>
      <div id="milkdown-editor" class="milkdown-editor"></div>
      <textarea id="raw-editor" class="raw-editor" hidden spellcheck="false"></textarea>
    </div>

    <!-- Large file warning -->
    <div id="large-file-warning" class="large-file-warning" hidden>
      <p>⚠ This file is large (<span id="large-file-size"></span>). Editing in raw mode for better performance.</p>
    </div>
  </main>

  <!-- New file modal -->
  <dialog id="new-file-dialog" class="modal">
    <form method="dialog">
      <h3>Create New File</h3>
      <label for="new-file-path">File path (relative to ~/):</label>
      <input type="text" id="new-file-path" placeholder="notes/my-note.md" autocomplete="off" spellcheck="false">
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="new-file-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="new-file-create">Create</button>
      </div>
    </form>
  </dialog>

  <!-- Scroll to top -->
  <button id="scroll-top" class="scroll-top-btn" title="Back to top">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M8 12V4M4 7l4-4 4 4"/>
    </svg>
  </button>

  <script type="module" src="/app.js"></script>
</body>
</html>
